name: Deploy Jekyll AI-PLUS62STORE Secret

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      API_KEY: ${{ secrets.API_KEY }}
      AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      APP_ID: ${{ secrets.APP_ID }}
      WA_KEY: ${{ secrets.WA_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
      SENDER_ID: ${{ secrets.SENDER_ID }}
      MEASUREMENT_ID: ${{ secrets.MEASUREMENT_ID }}
      PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
      MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
      MIDTRANS_URL: ${{ secrets.MIDTRANS_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build Jekyll Site
        run: bundle exec jekyll build

      - name: Deploy ke GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.BUKAN_GITHUB_TOKEN }}
          publish_dir: ./_site