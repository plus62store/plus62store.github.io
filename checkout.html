<ion-card class="review-checkout">
  <ion-item>
    <ion-icon name="cart-outline" slot="start"></ion-icon>
    <ion-label>Keranjang Belanja Kamu</ion-label>
    <ion-note slot="end" color="primary"><ion-badge color="danger" id="cart-menu" class="simpleCart_quantity"></ion-badge></ion-note>
  </ion-item>
<ion-card-content>
    {% include keranjang.html %}
</ion-card-content>
</ion-card>

<ion-card class="card-form" style="max-width: 680px;padding:6px;width: 100%;border: 1px solid #eee;border-radius: 5px;box-shadow: rgb(0 0 0 / 20%) 0px 3px 1px -2px, rgb(0 0 0 / 14%) 0px 2px 2px 0px, rgb(0 0 0 / 12%) 0px 1px 5px 0px;">
<div class="not_if">
      <span>Total belanja </span>sebesar <b style="font-size:larger;font-weight:900;"><span class="simpleCart_total"></span></b><p/>
<span style="font-size:10px;"> ( *Belum Termasuk Ongkir )</span><p/>
<ion-note color="danger">Silahkan isi data pengiriman dibawah ini..</ion-note>
</div>
<p/><br/>
<form id="checkout-form" method="post" action="/">
  <label>First Name</label>
  <input type="text" name="First Name">

  <label>Last Name</label>
  <input type="text" name="Last Name">

  <label>Email Address</label>
  <input type="text" name="Email">

  <label>Mailing Address</label>
  <input type="text" name="Street" placeholder="Street">
  <input type="text" name="City" placeholder="City">
  <input type="text" name="State" placeholder="State">
  <input type="text" name="Zip Code" placeholder="Zip Code">

  <input type="hidden" name="_to" value="{{ page.emails | join: ',' }}">
  <input type="text" name="_gotcha" style="display: none;">

  <button type="button" id="pay-button">bayar</button>
</form>

<script>
document.getElementById('pay-button').addEventListener('click', function () {
      const form = document.getElementById('checkout-form');
      const formData = new FormData(form);

// Simpan data pembeli ke localStorage
localStorage.setItem('buyer', JSON.stringify({
  first_name: formData.get('First Name'),
  last_name: formData.get('Last Name'),
  email: formData.get('Email'),
  street: formData.get('Street'),
  city: formData.get('City'),
  state: formData.get('State'),
  zip: formData.get('Zip Code')
}));

      // Cek jika ada isian honeypot (bot)
      if (formData.get('_gotcha')) return;

      const customer = {
        first_name: formData.get('First Name'),
        last_name: formData.get('Last Name'),
        email: formData.get('Email'),
        address: {
          street: formData.get('Street'),
          city: formData.get('City'),
          state: formData.get('State'),
          postal_code: formData.get('Zip Code')
        }
      };

      let items = [];
      let total = 0;

      simpleCart.each(function (item) {
        items.push({
          id: item.get('id') || item.get('name'),
          name: item.get('name'),
          quantity: item.get('quantity'),
          price: item.get('price')
        });
        total += item.get('total');
      });

      if (items.length === 0) {
        alert("Keranjang belanja masih kosong!");
        return;
      }

      fetch('/midtrans', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ total: total, items: items, customer: customer })
      })
      .then(res => res.json())
      .then(data => {
        snap.pay(data.token, {
          onSuccess: function(result) {                                
            localStorage.removeItem('simpleCart_items');
            alert("Pembayaran berhasil!");
          },
          onPending: function(result) {
            alert("Pembayaran tertunda. Silakan selesaikan pembayaran.");
          },
          onError: function(result) {
            alert("Terjadi kesalahan saat pembayaran.");
          },
          onClose: function() {
            alert("Pembayaran dibatalkan.");
          }
        });
      })
      .catch(err => {
        alert("Gagal memulai pembayaran, isi semua data diatas.");
        console.error(err);
      });
    });
</script>
