# Build settings
plugins:
  - jekyll-feed
  - jekyll-dotenv
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-figure

plugins_dir: _plugins

collections:
  blog:
    output: true

permalink: /product/:title/

defaults:
- scope:
    type: posts
  values:
    layout: shop

- scope:
    type: checkout
  values:
    layout: checkout-page

- scope:
    type: cart
  values:
    layout: cart-page

- scope:
    type: pages
  values:
    layout: page

- scope:
    type: blog
  values:
    layout: post

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: '/category/:name/'
    tags: '/tag/:name/'

compress_html:
  clippings: all
  ignore:
    envs: development

exclude: [lib, config.rb, .sass-cache, .env, Capfile, config, log, Rakefile, Rakefile.rb, tmp, Gemfile, Gemfile.lock, README.md, LICENSE.md, node_modules, gulpfile.js, package-lock.json]
